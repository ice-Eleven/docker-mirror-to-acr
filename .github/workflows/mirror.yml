name: Mirror Docker Hub Images to Aliyun ACR

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Aliyun ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Mirror node:24-bookworm-slim
        run: |
          docker pull node:24-bookworm-slim
          docker tag node:24-bookworm-slim ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/node:24-bookworm-slim
          docker push ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/node:24-bookworm-slim

      - name: Mirror node:24-bookworm
        run: |
          docker pull node:24-bookworm
          docker tag node:24-bookworm ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/node:24-bookworm
          docker push ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/node:24-bookworm

      - name: Mirror oven/bun:1.3.13
        run: |
          docker pull oven/bun:1.3.13
          docker tag oven/bun:1.3.13 ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/bun:1.3.13
          docker push ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/bun:1.3.13
